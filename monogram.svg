<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-labelledby="monogramTitle">
  <title id="monogramTitle">KS monogram styled as a shell prompt</title>

  <defs>
    <!-- subtle vignette so the tile has depth against the terminal frame -->
    <radialGradient id="ksVignette" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#16294A"/>
      <stop offset="100%" stop-color="#0D1B33"/>
    </radialGradient>

    <!-- faint grid, echoes the SOC/terminal language -->
    <pattern id="ksGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#2C4A6B" stroke-width="0.5" opacity="0.35"/>
    </pattern>

    <linearGradient id="ksGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3ECFB8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3ECFB8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="220" height="220" fill="url(#ksVignette)"/>
  <rect width="220" height="220" fill="url(#ksGrid)"/>
  <rect width="220" height="220" fill="url(#ksGlow)"/>

  <!-- corner brackets -->
  <g stroke="#2C4A6B" stroke-width="1.5" fill="none" opacity="0.9">
    <path d="M14 30V14h16"/>
    <path d="M190 14h16v16"/>
    <path d="M14 190v16h16"/>
    <path d="M206 190v16h-16"/>
  </g>

  <!-- prompt line -->
  <text x="110" y="86" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, Consolas, monospace"
        font-size="12" letter-spacing="0.5">
    <tspan fill="#3ECFB8">kurt@soc</tspan><tspan fill="#A9BBCC">:</tspan><tspan fill="#A9BBCC">~</tspan><tspan fill="#3ECFB8">$</tspan>
  </text>

  <!-- initials -->
  <text x="97" y="146" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, Consolas, monospace"
        font-size="62" font-weight="600" letter-spacing="2"
        fill="#EAF1F8">KS</text>

  <!-- blinking cursor -->
  <rect x="139" y="108" width="12" height="40" fill="#3ECFB8">
    <animate attributeName="opacity"
             values="1;1;0;0;1"
             keyTimes="0;0.45;0.5;0.95;1"
             dur="1.15s"
             repeatCount="indefinite"/>
  </rect>

  <!-- underline rule -->
  <line x1="62" y1="166" x2="158" y2="166" stroke="#2C4A6B" stroke-width="1"/>

  <!-- caption -->
  <text x="110" y="188" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, Consolas, monospace"
        font-size="9.5" letter-spacing="2.5"
        fill="#A9BBCC">SECURITY ANALYST</text>
</svg>
